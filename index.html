<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Bid Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/lib/owlbear.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <section id="scoreboard-section">
            <h2>Scoreboard</h2>
            <div id="scoreboard-list">
                <p>Loading players...</p>
            </div>
        </section>

        <hr>

        <section id="tracker-section">
            <h2>My Points</h2>
            <div class="tracker-controls">
                <button id="minus-btn">-1</button>
                <input type="number" id="points-display" value="0">
                <button id="plus-btn">+1</button>
            </div>
            <button id="set-points-btn">Update Points</button>
        </section>

        <hr>

        <section id="bidding-section">
            <h2>Secret Bid</h2>
            <p>Available to bid: <span id="max-bid-display">0</span></p>
            <input type="number" id="bid-input" placeholder="Enter bid..." min="0">
            <button id="lock-bid-btn">Lock In Bid</button>
            
        </section>

        <section id="status-section">
            <h3>Status</h3>
            <p id="room-status-text">Waiting for players to bid...</p>
            <button id="reveal-btn" disabled>Reveal Bids!</button>
        </section>
    </div>

 <script src="https://owlmech.github.io/BidMech/app.js?v=3"></script>
</body>
</html>
